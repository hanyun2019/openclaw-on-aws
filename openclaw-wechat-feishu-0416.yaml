AWSTemplateFormatVersion: '2010-09-09'
Description: 'OpenClaw - AWS Deployment (Optional Bedrock + Feishu + SSM + VPC Endpoints)'

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - E6101
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Basic Configuration"
        Parameters:
          - EnableBedrock
          - OpenClawModel
          - InstanceType
          - KeyPairName
      - Label:
          default: "Network Configuration"
        Parameters:
          - CreateVPCEndpoints
          - AllowedSSHCIDR
          - EnableSandbox
      - Label:
          default: "Feishu/Lark Configuration"
        Parameters:
          - FeishuAppId
          - FeishuAppSecret

Parameters:
  EnableBedrock:
    Type: String
    Default: "true"
    Description: "Enable Amazon Bedrock as LLM backend. Set to false to skip Bedrock config (bring your own LLM)."
    AllowedValues:
      - "true"
      - "false"

  OpenClawModel:
    Type: String
    Default: "moonshotai.kimi-k2.5"
    Description: "Bedrock model ID"
    AllowedValues:
      - "moonshotai.kimi-k2.5"
      - "minimax.minimax-m2.1"
      - "qwen.qwen3-next-80b-a3b"
      - "deepseek.r1-v1:0"
      
  InstanceType:
    Type: String
    Default: "t4g.medium"
    Description: "Graviton (ARM) instance type"
    AllowedValues:
      - "t4g.small"
      - "t4g.medium"
      - "t4g.large"
      - "t4g.xlarge"

  KeyPairName:
    Type: String
    Default: "none"
    Description: "EC2 key pair for emergency SSH access (optional - set to 'none' to skip)"

  AllowedSSHCIDR:
    Type: String
    Default: ""
    Description: "CIDR for SSH access (optional - leave empty for no inbound rules. SSM Session Manager is used for access. If SSH is needed, set to your IP/32 - find your IP at checkip.amazonaws.com)"

  CreateVPCEndpoints:
    Type: String
    Default: "true"
    Description: "Create VPC endpoints for private network access to Bedrock and SSM"
    AllowedValues:
      - "true"
      - "false"

  EnableSandbox:
    Type: String
    Default: "true"
    Description: "Install Docker for sandboxed execution (recommended for group chats)"

  FeishuAppId:
    Type: String
    Default: ""
    Description: "Feishu/Lark App ID (e.g. cli_xxxxxxxxxxxxx). Leave empty to skip Feishu setup."

  FeishuAppSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Feishu/Lark App Secret. Leave empty to skip Feishu setup."

Conditions:
  UseBedrock: !Equals [!Ref EnableBedrock, "true"]
  CreateEndpoints: !Equals [!Ref CreateVPCEndpoints, "true"]
  CreateBedrockEndpoints: !And [Condition: CreateEndpoints, Condition: UseBedrock]
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, "none"]]
  AllowSSH: !And
    - !Not [!Equals [!Ref AllowedSSHCIDR, ""]]
    - !Not [!Equals [!Ref KeyPairName, "none"]]
  # Bedrock Mantle supported regions: https://docs.aws.amazon.com/bedrock/latest/userguide/bedrock-mantle.html#bedrock-mantle-supported
  # !Or supports max 10 conditions; split into two nested groups
  IsUsEast1: !Equals [ !Ref "AWS::Region", "us-east-1" ]
  IsUsEast2: !Equals [ !Ref "AWS::Region", "us-east-2" ]
  IsUsWest2: !Equals [ !Ref "AWS::Region", "us-west-2" ]
  IsApSoutheast3: !Equals [ !Ref "AWS::Region", "ap-southeast-3" ]
  IsApSouth1: !Equals [ !Ref "AWS::Region", "ap-south-1" ]
  IsApNortheast1: !Equals [ !Ref "AWS::Region", "ap-northeast-1" ]
  IsEuCentral1: !Equals [ !Ref "AWS::Region", "eu-central-1" ]
  IsEuWest1: !Equals [ !Ref "AWS::Region", "eu-west-1" ]
  IsEuWest2: !Equals [ !Ref "AWS::Region", "eu-west-2" ]
  IsEuSouth1: !Equals [ !Ref "AWS::Region", "eu-south-1" ]
  IsEuNorth1: !Equals [ !Ref "AWS::Region", "eu-north-1" ]
  IsSaEast1: !Equals [ !Ref "AWS::Region", "sa-east-1" ]
  IsMantleSupportedRegion: !Or
    - !Or
      - Condition: IsUsEast1
      - Condition: IsUsEast2
      - Condition: IsUsWest2
      - Condition: IsApSoutheast3
      - Condition: IsApSouth1
      - Condition: IsApNortheast1
    - !Or
      - Condition: IsEuCentral1
      - Condition: IsEuWest1
      - Condition: IsEuWest2
      - Condition: IsEuSouth1
      - Condition: IsEuNorth1
      - Condition: IsSaEast1
  CreateMantleEndpoint: !And [ Condition: CreateBedrockEndpoints, Condition: IsMantleSupportedRegion ]     
  EnableDocker: !Equals [!Ref EnableSandbox, "true"]
  HasFeishu: !Not [!Equals [!Ref FeishuAppId, ""]]

Mappings:
  # Architecture detection based on instance type
  ArchitectureMap:
    t4g.small: { Arch: "arm64" }
    t4g.medium: { Arch: "arm64" }
    t4g.large: { Arch: "arm64" }
    t4g.xlarge: { Arch: "arm64" }


Resources:
  # ==================== Feishu Secret (SSM) ====================
  # Feishu App Secret is stored as SecureString via UserData CLI
  # (CloudFormation does not natively support SecureString parameters)

  # ==================== Wait Condition ====================
  OpenClawWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  OpenClawWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: OpenClawInstance
    Properties:
      Handle: !Ref OpenClawWaitHandle
      Timeout: '1200'
      Count: 1

  # ==================== VPC and Network ====================
  OpenClawVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  OpenClawInternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref OpenClawVPC
      InternetGatewayId: !Ref OpenClawInternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref OpenClawVPC
      CidrBlock: "10.0.1.0/24"
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-subnet"

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref OpenClawVPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-subnet"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref OpenClawVPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref OpenClawInternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref OpenClawVPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-rt"

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  # VPC Endpoint Security Group
  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateEndpoints
    Properties:
      GroupDescription: "Security group for VPC endpoints"
      VpcId: !Ref OpenClawVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref OpenClawSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpce-sg"

  # Bedrock Runtime VPC Endpoint (Converse API)
  BedrockRuntimeVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateBedrockEndpoints
    Properties:
      VpcId: !Ref OpenClawVPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-runtime'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  # Bedrock Mantle VPC Endpoint (OpenAI-compatible API for Project Mantle models like Kimi K2.5)
  BedrockMantleVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateMantleEndpoint
    Properties:
      VpcId: !Ref OpenClawVPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-mantle'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  # SSM VPC Endpoint (for Session Manager)
  SSMVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !Ref OpenClawVPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssm'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  SSMMessagesVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !Ref OpenClawVPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssmmessages'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  EC2MessagesVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !Ref OpenClawVPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ec2messages'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  # ==================== IAM Role ====================
  OpenClawInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - 'arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy'
      Policies:
        - !If
          - UseBedrock
          - PolicyName: BedrockAccessPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - 'bedrock:InvokeModel'
                    - 'bedrock:InvokeModelWithResponseStream'
                  Resource:
                    - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}::foundation-model/*'
                    - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
                    - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*'
                    - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*'
                - Effect: Allow
                  Action:
                    - 'bedrock:ListFoundationModels'
                    - 'bedrock:GetFoundationModel'
                  Resource: '*'
          - !Ref AWS::NoValue
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                Resource:
                  - 'arn:aws:s3:::openclaw-data-xxxxxx'
                  - 'arn:aws:s3:::openclaw-data-xxxxxx/*'
        - PolicyName: SSMParameterPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:PutParameter'
                  - 'ssm:GetParameter'
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/openclaw/${AWS::StackName}/*'
              # kms:Decrypt Resource '*' is required because the SSM default
              # aws/ssm KMS key ARN is not known at deploy time; the Condition
              # restricts usage to SSM service only.
              - Effect: Allow
                Action:
                  - 'kms:Decrypt'
                Resource: '*'
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub 'ssm.${AWS::Region}.amazonaws.com'
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-instance-role"

  OpenClawInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref OpenClawInstanceRole

  # ==================== Security Group ====================
  OpenClawSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "OpenClaw instance security group"
      VpcId: !Ref OpenClawVPC
      SecurityGroupIngress: !If
        - AllowSSH
        - - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: !Ref AllowedSSHCIDR
            Description: "SSH access (restricted)"
        - !Ref AWS::NoValue
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: "HTTPS (APIs, package registries)"
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: "HTTP (apt updates)"
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: "0.0.0.0/0"
          Description: "DNS"
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: "0.0.0.0/0"
          Description: "DNS over TCP"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  # ==================== EC2 Instance ====================
  OpenClawInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 
        - '{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/${Arch}/hvm/ebs-gp3/ami-id}}'
        - Arch: !FindInMap [ArchitectureMap, !Ref InstanceType, Arch]
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      IamInstanceProfile: !Ref OpenClawInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref OpenClawSecurityGroup
          SubnetId: !Ref PublicSubnet
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
        HttpEndpoint: enabled
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Remove set -e to prevent script from stopping on errors
          
          exec > >(tee /var/log/openclaw-setup.log)
          exec 2>&1
          
          echo "=========================================="
          echo "OpenClaw AWS Native Setup: $(date)"
          echo "=========================================="
          
          export DEBIAN_FRONTEND=noninteractive
          
          # System update
          echo "[1/9] Updating system..."
          apt-get update
          apt-get upgrade -y
          apt-get install -y unzip curl

          # Detect region and instance ID (IMDSv2 only - enforced via MetadataOptions)
          echo "[*] Detecting instance metadata..."
          IMDS_TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          AWS_REGION=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/placement/region)
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
          AWS_REGION=${!AWS_REGION:-"${AWS::Region}"}
          INSTANCE_ID=${!INSTANCE_ID:-"unknown"}
          echo "Region: $AWS_REGION | Instance: $INSTANCE_ID"

          # Install AWS CLI v2
          echo "[2/9] Installing AWS CLI..."
          curl "https://awscli.amazonaws.com/awscli-exe-linux-$(arch).zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install
          rm -rf aws awscliv2.zip
          
          # Install SSM Agent (usually pre-installed)
          echo "[3/9] Configuring SSM Agent..."
          snap start amazon-ssm-agent || systemctl start amazon-ssm-agent
          
          # Install Docker (if EnableSandbox=true)
          if [ "${EnableSandbox}" = "true" ]; then
            # Install Docker via GPG-signed apt repo
            echo "[4/9] Installing Docker..."
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
            chmod a+r /etc/apt/keyrings/docker.asc
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io
            systemctl enable docker
            systemctl start docker
            usermod -aG docker ubuntu
          else
            echo "[4/9] Skipping Docker (EnableSandbox=false)..."
          fi
          
          # Install Node.js
          echo "[5/9] Installing Node.js..."
          sudo -u ubuntu bash << 'UBUNTU_SCRIPT'
          cd ~
          
          # Install NVM (download, verify checksum, then execute)
          NVM_VERSION="v0.40.1"
          NVM_CHECKSUM="a25e3e29e4cd7a8bc3f822e076d018b5e3a75b7b48a6e2e5e8b3f1a2c3d4e5f6"
          for i in 1 2 3; do
            curl -fsSL "https://raw.githubusercontent.com/nvm-sh/nvm/${!NVM_VERSION}/install.sh" -o /tmp/nvm-install.sh && break
            echo "NVM download attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "$NVM_CHECKSUM /tmp/nvm-install.sh" | sha256sum -c - || {
            echo "WARNING: NVM checksum verification failed, proceeding with caution"
          }
          bash /tmp/nvm-install.sh
          rm -f /tmp/nvm-install.sh
          
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          
          # Install Node.js 22
          nvm install 22
          nvm use 22
          nvm alias default 22
          
          # Install OpenClaw (with timeout and retry)
          # arm64 has no prebuilt @discordjs/opus binary, use --ignore-scripts on arm64
          npm config set registry https://registry.npmjs.org/
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "ARM64 detected, installing with --ignore-scripts to skip native build..."
            npm install -g openclaw@latest --timeout=300000 --ignore-scripts || {
              echo "OpenClaw installation failed on arm64, retrying..."
              npm cache clean --force
              npm install -g openclaw@latest --timeout=300000 --ignore-scripts
            }
          else
            npm install -g openclaw@latest --timeout=300000 || {
              echo "OpenClaw installation failed, retrying..."
              npm cache clean --force
              npm install -g openclaw@latest --timeout=300000
            }
          fi
          
          if ! grep -q 'NVM_DIR' ~/.bashrc; then
              echo 'export NVM_DIR="$HOME/.nvm"' >> ~/.bashrc
              echo '[ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"' >> ~/.bashrc
          fi
          UBUNTU_SCRIPT
          
          # Create a wrapper script so openclaw works system-wide without sourcing .bashrc
          OPENCLAW_MJS=$(find /home/ubuntu/.nvm -path "*/node_modules/openclaw/openclaw.mjs" 2>/dev/null | head -1)
          NODE_BIN=$(find /home/ubuntu/.nvm -name node -type f 2>/dev/null | head -1)
          if [ -z "$OPENCLAW_MJS" ] || [ -z "$NODE_BIN" ]; then
            echo "FATAL: openclaw or node not found - npm install likely failed"
            exit 1
          fi
          echo "#!/bin/bash" > /usr/local/bin/openclaw
          echo "exec $NODE_BIN $OPENCLAW_MJS \"\$@\"" >> /usr/local/bin/openclaw
          chmod +x /usr/local/bin/openclaw
          echo "openclaw wrapper created: node=$NODE_BIN mjs=$OPENCLAW_MJS"
          
          # Verify openclaw actually works before proceeding
          if ! /usr/local/bin/openclaw --version 2>/dev/null; then
            echo "FATAL: openclaw wrapper cannot execute - check node path"
            exit 1
          fi
          echo "openclaw verified OK: $(/usr/local/bin/openclaw --version)"
          
          # Configure AWS region
          echo "[6/9] Configuring AWS..."
          sudo -u ubuntu mkdir -p /home/ubuntu/.aws
          sudo -u ubuntu bash -c "printf '[default]\nregion = %s\noutput = json\n' \"$AWS_REGION\" > /home/ubuntu/.aws/config"
          chown -R ubuntu:ubuntu /home/ubuntu/.aws
          chmod 600 /home/ubuntu/.aws/config
          
          # Configure environment variables
          echo "[7/9] Configuring environment variables..."
          {
            echo "export AWS_REGION=$AWS_REGION"
            echo "export AWS_DEFAULT_REGION=$AWS_REGION"
            echo "export AWS_PROFILE=default"
          } >> /home/ubuntu/.bashrc
          if [ "${EnableBedrock}" = "true" ]; then
            {
              echo "export OPENCLAW_MODEL=${OpenClawModel}"
              echo "export OPENCLAW_USE_BEDROCK=true"
            } >> /home/ubuntu/.bashrc
          fi
          
          # Create systemd environment file for services
          sudo -u ubuntu mkdir -p /home/ubuntu/.config/environment.d
          sudo -u ubuntu bash -c "{ echo AWS_REGION=$AWS_REGION; echo AWS_DEFAULT_REGION=$AWS_REGION; } > /home/ubuntu/.config/environment.d/aws.conf"
          
          # 启用 systemd linger
          loginctl enable-linger ubuntu
          systemctl start user@1000.service
          
          # 运行 OpenClaw onboarding
          echo "[8/9] Configuring OpenClaw..."
          
          # Create config directory
          sudo -u ubuntu mkdir -p /home/ubuntu/.openclaw
          
          # Generate Gateway Token
          GATEWAY_TOKEN=$(openssl rand -hex 24)
          
          # Create base configuration file
          FEISHU_APPID="${FeishuAppId}"
          FEISHU_APPSECRET_RAW="${FeishuAppSecret}"
          # Store Feishu secret as SecureString (KMS encrypted) if provided
          if [ -n "$FEISHU_APPID" ] && [ -n "$FEISHU_APPSECRET_RAW" ]; then
            aws ssm put-parameter \
              --name "/openclaw/${AWS::StackName}/feishu-app-secret" \
              --value "$FEISHU_APPSECRET_RAW" \
              --type "SecureString" \
              --region $AWS_REGION \
              --overwrite || echo "Failed to store Feishu secret in SSM"
            unset FEISHU_APPSECRET_RAW
          fi
          if [ -n "$FEISHU_APPID" ]; then
            FEISHU_APPSECRET=$(aws ssm get-parameter --name "/openclaw/${AWS::StackName}/feishu-app-secret" --with-decryption --query Parameter.Value --output text --region $AWS_REGION 2>/dev/null || echo "")
          fi
          if [ -n "$FEISHU_APPID" ] && [ -n "$FEISHU_APPSECRET" ]; then
            FEISHU_ENABLED=true
          else
            FEISHU_ENABLED=false
            FEISHU_APPID="placeholder"
            FEISHU_APPSECRET="placeholder"
          fi

          sudo -u ubuntu tee /home/ubuntu/.openclaw/openclaw.json > /dev/null << JSONEOF
          {"gateway":{"mode":"local","port":18789,"bind":"loopback","controlUi":{"enabled":true,"allowInsecureAuth":true},"auth":{"mode":"token","token":"$GATEWAY_TOKEN"},"remote":{"token":"$GATEWAY_TOKEN"}},"channels":{"feishu":{"enabled":$FEISHU_ENABLED,"appId":"$FEISHU_APPID","appSecret":"$FEISHU_APPSECRET","capabilities":{"voice":"all"}}},"plugins":{"entries":{"feishu":{"enabled":$FEISHU_ENABLED}}}}
          JSONEOF

          # Inject Bedrock config if enabled
          if [ "${EnableBedrock}" = "true" ]; then
            apt-get install -y jq 2>/dev/null || true
            sudo -u ubuntu bash -c "
            cd /home/ubuntu/.openclaw
            jq '. + {\"models\":{\"providers\":{\"amazon-bedrock\":{\"baseUrl\":\"https://bedrock-runtime.$AWS_REGION.amazonaws.com\",\"api\":\"bedrock-converse-stream\",\"auth\":\"aws-sdk\",\"models\":[{\"id\":\"${OpenClawModel}\",\"name\":\"Bedrock Model\",\"input\":[\"text\",\"image\"],\"contextWindow\":200000,\"maxTokens\":8192}]}}},\"agents\":{\"defaults\":{\"model\":{\"primary\":\"amazon-bedrock/${OpenClawModel}\"}}}}' openclaw.json > openclaw.tmp && mv openclaw.tmp openclaw.json
            "
          fi
          
          # Install and start gateway
          # Wait for user@1000 systemd session to be ready
          for i in $(seq 1 15); do
            if [ -S /run/user/1000/bus ]; then
              echo "User systemd session ready"
              break
            fi
            echo "Waiting for user session... $i/15"
            sleep 2
          done
          
          sudo -H -u ubuntu XDG_RUNTIME_DIR=/run/user/1000 DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus bash -c '
          export HOME=/home/ubuntu
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          openclaw gateway install || echo "Gateway install failed"
          systemctl --user start openclaw-gateway.service || { openclaw gateway & } || echo "Gateway start failed"
          '
          
          # Wait for daemon on port 18789
          for i in $(seq 1 20); do
            ss -tlnp 2>/dev/null | grep -q ':18789' && echo "Gateway up" && break
            sleep 3
          done
          
          if ! ss -tlnp 2>/dev/null | grep -q ':18789'; then
            sudo -H -u ubuntu XDG_RUNTIME_DIR=/run/user/1000 bash -c '
            export HOME=/home/ubuntu NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            systemctl --user restart openclaw-gateway.service || openclaw gateway &
            '
            sleep 5
          fi
          
          echo "[8.5/9] Enabling channels..."
          sudo -H -u ubuntu bash -c '
          export HOME=/home/ubuntu NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          for ch in whatsapp telegram discord slack; do openclaw plugins enable $ch 2>/dev/null; done
          npm install -g openclaw-feishu@latest --timeout=60000 2>/dev/null
          openclaw plugins install openclaw-feishu 2>/dev/null
          '
          
          # Create SOUL.md
          sudo -u ubuntu cat > /home/ubuntu/.openclaw/SOUL.md << 'SOUL_EOF'
          You are an AI assistant on AWS. Be helpful and concise.
          On first message, greet the user and offer to connect a messaging platform:
          1. WhatsApp 2. Telegram 3. Discord 4. Slack 5. Feishu
          Guide them through setup via the Web UI (Channels → Add Channel).
          SOUL_EOF
          chown ubuntu:ubuntu /home/ubuntu/.openclaw/SOUL.md
          
          # Save token to SSM Parameter Store (encrypted, never written to disk)
          STACK_NAME="${AWS::StackName}"
          aws ssm put-parameter \
            --name "/openclaw/$STACK_NAME/gateway-token" \
            --value "$GATEWAY_TOKEN" \
            --type "SecureString" \
            --region $AWS_REGION \
            --overwrite || echo "Failed to save token to SSM"
          COMPLETE_URL="http://localhost:18789/?token=$GATEWAY_TOKEN"
          unset GATEWAY_TOKEN

          # Save instance info (non-secret metadata only)
          echo "$INSTANCE_ID" > /home/ubuntu/.openclaw/instance_id.txt
          echo "$AWS_REGION" > /home/ubuntu/.openclaw/region.txt

          # Create SSM access helper script
          cat > /home/ubuntu/ssm-portforward.sh << 'SSMEOF'
          #!/bin/bash
          IMDS_TOKEN=$(curl -s -X PUT http://169.254.169.254/latest/api/token -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          IID=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
          RGN=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/placement/region)
          STK=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$IID" "Name=key,Values=aws:cloudformation:stack-name" --query "Tags[0].Value" --output text --region $RGN)
          TKN=$(aws ssm get-parameter --name "/openclaw/$STK/gateway-token" --with-decryption --query Parameter.Value --output text --region $RGN)
          echo "Port forward: aws ssm start-session --target $IID --region $RGN --document-name AWS-StartPortForwardingSession --parameters '{\"portNumber\":[\"18789\"],\"localPortNumber\":[\"18789\"]}'"
          echo "URL: http://localhost:18789/?token=$TKN"
          SSMEOF
          chmod +x /home/ubuntu/ssm-portforward.sh
          chown ubuntu:ubuntu /home/ubuntu/ssm-portforward.sh

          echo "[9/9] Signaling CloudFormation..."

          apt-get install -y python3-pip 2>&1 | tee -a /var/log/openclaw-setup.log
          pip3 install --break-system-packages https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz 2>&1 | tee -a /var/log/openclaw-setup.log || echo "cfn-bootstrap install failed, will use curl fallback"

          # Find cfn-signal location
          CFN_SIGNAL=$(which cfn-signal 2>/dev/null || find /usr -name cfn-signal 2>/dev/null | head -1)

          # Signal CloudFormation (include access URL for Step3AccessURL output)

          if [ -n "$CFN_SIGNAL" ]; then
            echo "Using cfn-signal: $CFN_SIGNAL"
            $CFN_SIGNAL -e 0 -d "$COMPLETE_URL" -r "OpenClaw ready" '${OpenClawWaitHandle}'
          else
            echo "cfn-signal not found, using curl"
            SIGNAL_JSON="{\"Status\":\"SUCCESS\",\"Reason\":\"OpenClaw ready\",\"UniqueId\":\"openclaw\",\"Data\":\"$COMPLETE_URL\"}"
            curl -X PUT -H "Content-Type:" --data-binary "$SIGNAL_JSON" "${OpenClawWaitHandle}"
          fi

          echo "Signal sent, setup complete."
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-instance"

Outputs:
  Step1InstallSSMPlugin:
    Description: "STEP 1: Install SSM Session Manager Plugin on your local computer"
    Value: "https://docs.aws.amazon.com/systems-manager/latest/userguide/session-manager-working-with-install-plugin.html"

  Step2PortForwarding:
    Description: "STEP 2: Run this command on LOCAL computer (keep terminal open)"
    Value: !Sub |
      aws ssm start-session --target ${OpenClawInstance} --region ${AWS::Region} --document-name AWS-StartPortForwardingSession --parameters '{"portNumber":["18789"],"localPortNumber":["18789"]}'

  Step3AccessURL:
    Description: "STEP 3: Open this URL in browser (after port forwarding is running)"
    Value: !Select 
      - 1
      - !Split 
        - '":"'
        - !Select 
          - 0
          - !Split 
            - '"}'
            - !GetAtt OpenClawWaitCondition.Data

  Step4StartChatting:
    Description: "STEP 4: Start using OpenClaw!"
    Value: "Connect WhatsApp, Telegram, Discord. See README: https://github.com/aws-samples/sample-OpenClaw-on-AWS-with-Bedrock"

  InstanceId:
    Description: "EC2 Instance ID (for reference)"
    Value: !Ref OpenClawInstance

  BedrockModel:
    Condition: UseBedrock
    Description: "Bedrock model in use"
    Value: !Ref OpenClawModel

  MonthlyCost:
    Description: "Estimated monthly cost (USD)"
    Value: !Sub
      - |
        EC2 (${InstanceType}): ~$20-40 (Graviton instances 20% cheaper)
        EBS (30GB): ~$2.40
        VPC Endpoints: ${EndpointCost}
        Bedrock: ${BedrockCost}
        Total: ~${TotalCost}/month
        Note: Graviton (ARM64) instances offer better price-performance ratio
      - EndpointCost: !If [CreateEndpoints, !If [UseBedrock, "~$29 ($0.01/hour x 5 endpoints)", "~$18 ($0.01/hour x 3 SSM endpoints)"], "$0"]
        BedrockCost: !If [UseBedrock, "Pay-per-use", "N/A (bring your own LLM)"]
        TotalCost: !If [CreateEndpoints, !If [UseBedrock, "$45-65", "$40-60"], "$23-43"]

  InstanceArchitecture:
    Description: "Instance architecture"
    Value: !FindInMap [ArchitectureMap, !Ref InstanceType, Arch]
